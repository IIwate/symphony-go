name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  go-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go Tests
        shell: pwsh
        run: go test ./...
